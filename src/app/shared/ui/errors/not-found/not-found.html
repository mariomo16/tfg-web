<section
  class="relative min-h-screen flex items-center justify-center bg-surface-900 overflow-hidden"
>
  <div
    class="absolute top-1/4 left-1/4 w-96 h-96 bg-accent-blue/20 rounded-full blur-[120px] animate-pulse"
  ></div>
  <div
    class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-accent-violet/20 rounded-full blur-[120px] animate-pulse delay-700"
  ></div>

  <div class="relative z-10 text-center px-6">
    <h1
      class="text-[12rem] font-black leading-none tracking-tighter text-transparent bg-clip-text bg-linear-to-b from-white to-white/20 select-none opacity-20"
    >
      404
    </h1>

    <div class="-mt-20">
      <h2 class="text-4xl font-bold text-text-primary mb-4 tracking-tight">Página no encontrada</h2>
      <p class="text-text-secondary max-w-md mx-auto mb-8 text-lg">
        Lo sentimos, la página que estás buscando no existe o ha sido movida a otra ubicación.
      </p>

      <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
        <a
          routerLink="/"
          class="px-8 py-3.5 text-sm font-bold text-surface-900 bg-linear-to-r from-accent-blue to-accent-violet rounded-2xl hover:scale-105 active:scale-95 transition-all shadow-lg shadow-accent-blue/20"
        >
          Volver al inicio
        </a>
        <button
          type="button"
          (click)="goBack()"
          class="px-8 py-3.5 text-sm font-bold text-text-primary glass-card rounded-2xl hover:bg-surface-700/50 transition-all cursor-pointer"
        >
          Página anterior
        </button>
      </div>
    </div>
  </div>
</section>
