<section class="relative min-h-screen flex items-center justify-center bg-surface-900">
  <a
    routerLink="/"
    class="absolute top-6 left-6 z-20 hidden sm:flex items-center gap-2 text-sm text-text-secondary hover:text-text-primary transition-colors group"
  >
    <svg
      class="w-5 h-5 transition-transform group-hover:-translate-x-0.5"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <title>Volver (Escritorio)</title>
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M10 19l-7-7m0 0l7-7m-7 7h18"
      />
    </svg>
    Inicio
  </a>

  <div
    class="absolute top-1/4 right-1/4 w-80 h-80 bg-accent-violet/10 rounded-full blur-3xl animate-zoom-in"
  ></div>
  <div
    class="absolute bottom-1/4 left-1/4 w-80 h-80 bg-accent-blue/10 rounded-full blur-3xl animate-zoom-in"
  ></div>

  <div class="relative z-10 w-full max-w-md mx-4 glass-card-no-animation rounded-2xl p-6">
    <a
      routerLink="/"
      class="absolute top-5 left-5 sm:hidden flex items-center justify-center w-11 h-11 rounded-full bg-surface-800/50 border border-surface-600/50 text-text-secondary hover:text-text-primary transition-all"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <title>Volver (Móvil)</title>
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 19l-7-7m0 0l7-7m-7 7h18"
        />
      </svg>
    </a>

    <!-- Encabezado -->
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-text-primary">Crea tu cuenta</h1>
      <p class="mt-1.5 text-sm text-text-secondary">Regístrate y empieza a reservar al instante</p>
    </div>

    <form class="space-y-4">
      <div>
        <label for="register-name" class="block text-sm font-medium text-text-secondary mb-1.5">
          Nombre completo
        </label>
        <input
          id="register-name"
          type="text"
          placeholder="Tu nombre"
          class="w-full px-4 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-violet focus:ring-1 focus:ring-accent-violet transition-colors"
        />
      </div>

      <div>
        <label for="register-email" class="block text-sm font-medium text-text-secondary mb-1.5">
          Correo electrónico
        </label>
        <input
          id="register-email"
          type="email"
          placeholder="tu@email.com"
          class="w-full px-4 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-violet focus:ring-1 focus:ring-accent-violet transition-colors"
        />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label
            for="register-password"
            class="block text-sm font-medium text-text-secondary mb-1.5"
          >
            Contraseña
          </label>
          <input
            id="register-password"
            type="password"
            placeholder="Mín. 8 caracteres"
            class="w-full px-3 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-violet focus:ring-1 focus:ring-accent-violet transition-colors"
          />
        </div>
        <div>
          <label
            for="register-confirm"
            class="block text-sm font-medium text-text-secondary mb-1.5"
          >
            Confirmar
          </label>
          <input
            id="register-confirm"
            type="password"
            placeholder="Repite contraseña"
            class="w-full px-3 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-violet focus:ring-1 focus:ring-accent-violet transition-colors"
          />
        </div>
      </div>

      <button
        type="submit"
        class="w-full mt-2 py-2.5 text-sm font-semibold text-surface-900 bg-linear-to-r from-accent-violet to-accent-blue rounded-xl hover:opacity-90 transition-all hover:shadow-lg hover:shadow-accent-violet/25 cursor-pointer"
      >
        Crear cuenta
      </button>
    </form>

    <div class="flex items-center gap-4 my-4">
      <div class="flex-1 h-px bg-surface-600"></div>
      <span class="text-sm text-text-muted">o regístrate con</span>
      <div class="flex-1 h-px bg-surface-600"></div>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <button
        type="button"
        class="flex items-center justify-center gap-2 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm font-medium text-text-secondary hover:bg-surface-700 hover:text-text-primary transition-colors cursor-pointer"
      >
        <span [innerHTML]="googleIcon | safeHtml"></span>
        Google
      </button>
      <button
        type="button"
        class="flex items-center justify-center gap-2 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm font-medium text-text-secondary hover:bg-surface-700 hover:text-text-primary transition-colors cursor-pointer"
      >
        <span [innerHTML]="githubIcon | safeHtml"></span>
        GitHub
      </button>
    </div>

    <p class="mt-4 text-center text-sm text-text-secondary">
      ¿Ya tienes cuenta?
      <a
        routerLink="/login"
        class="font-medium text-accent-violet hover:text-accent-blue transition-colors"
      >
        Inicia sesión
      </a>
    </p>
  </div>
</section>
