<div class="p-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-text-primary">Zonas</h1>
      <p class="mt-1 text-sm text-text-secondary">Gestiona las zonas del local</p>
    </div>
    <a
      routerLink="/admin/zones/new"
      class="px-4 py-2.5 text-sm font-semibold text-surface-900 bg-linear-to-r from-accent-blue to-accent-violet rounded-xl hover:opacity-90 transition-all cursor-pointer"
    >
      + Nueva zona
    </a>
  </div>

  <div class="glass-card-no-animation rounded-xl overflow-hidden">
    <table class="w-full">
      <thead>
        <tr class="border-b border-surface-600">
          <th
            class="text-left px-6 py-3 text-xs font-semibold text-text-muted uppercase tracking-wider"
          >
            ID
          </th>
          <th
            class="text-left px-6 py-3 text-xs font-semibold text-text-muted uppercase tracking-wider"
          >
            Nombre
          </th>
          <th
            class="text-left px-6 py-3 text-xs font-semibold text-text-muted uppercase tracking-wider"
          >
            Precio/Franja
          </th>
          <th
            class="text-left px-6 py-3 text-xs font-semibold text-text-muted uppercase tracking-wider"
          >
            Ordenadores
          </th>
          <th
            class="text-right px-6 py-3 text-xs font-semibold text-text-muted uppercase tracking-wider"
          >
            Acciones
          </th>
        </tr>
      </thead>
      <tbody class="divide-y divide-surface-700">
        <tr class="hover:bg-surface-700/30 transition-colors">
          <td class="px-6 py-4 text-sm text-text-muted">1</td>
          <td class="px-6 py-4 text-sm font-medium text-text-primary">Gaming</td>
          <td class="px-6 py-4 text-sm text-text-secondary">3.50 €</td>
          <td class="px-6 py-4 text-sm text-text-secondary">5</td>
          <td class="px-6 py-4 text-right">
            <a
              routerLink="/admin/zones/1/edit"
              class="text-sm text-accent-blue hover:text-accent-violet transition-colors mr-3"
              >Editar</a
            >
            <button
              type="button"
              class="text-sm text-red-400 hover:text-red-300 transition-colors cursor-pointer"
            >
              Eliminar
            </button>
          </td>
        </tr>
        <tr class="hover:bg-surface-700/30 transition-colors">
          <td class="px-6 py-4 text-sm text-text-muted">2</td>
          <td class="px-6 py-4 text-sm font-medium text-text-primary">Streaming</td>
          <td class="px-6 py-4 text-sm text-text-secondary">4.00 €</td>
          <td class="px-6 py-4 text-sm text-text-secondary">4</td>
          <td class="px-6 py-4 text-right">
            <a
              routerLink="/admin/zones/2/edit"
              class="text-sm text-accent-blue hover:text-accent-violet transition-colors mr-3"
              >Editar</a
            >
            <button
              type="button"
              class="text-sm text-red-400 hover:text-red-300 transition-colors cursor-pointer"
            >
              Eliminar
            </button>
          </td>
        </tr>
        <tr class="hover:bg-surface-700/30 transition-colors">
          <td class="px-6 py-4 text-sm text-text-muted">3</td>
          <td class="px-6 py-4 text-sm font-medium text-text-primary">Trabajo</td>
          <td class="px-6 py-4 text-sm text-text-secondary">2.50 €</td>
          <td class="px-6 py-4 text-sm text-text-secondary">3</td>
          <td class="px-6 py-4 text-right">
            <a
              routerLink="/admin/zones/3/edit"
              class="text-sm text-accent-blue hover:text-accent-violet transition-colors mr-3"

            >
            <button
              type="button"
              class="text-sm text-red-400 hover:text-red-300 transition-colors cursor-pointer"
            >
              Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
