<div class="flex min-h-screen bg-surface-900">
  <aside
    class="fixed inset-y-0 left-0 z-30 w-64 bg-surface-800 border-r border-surface-700 flex flex-col"
  >
    <div class="px-6 py-5 border-b border-surface-700">
      <a routerLink="/" class="text-xl font-bold text-gradient tracking-tight">{{ appName }}</a>
      <p class="text-xs text-text-muted mt-1">Panel de administración</p>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      <a
        routerLink="/admin/dashboard"
        routerLinkActive="bg-surface-700 text-text-primary"
        [class]="navClasses"
      >
        <span [innerHTML]="dashboardIcons.dashboard | safeHtml"></span>
        Dashboard
      </a>

      <p class="px-3 pt-4 pb-1 text-xs font-semibold text-text-muted uppercase tracking-wider">
        Catálogo
      </p>

      @for (item of catalog; track $index) {
        <a
          [routerLink]="[item.routerLink]"
          routerLinkActive="bg-surface-700 text-text-primary"
          [class]="navClasses"
        >
          <span [innerHTML]="item.icon | safeHtml"></span>
          {{ item.name }}
        </a>
      }

      <p class="px-3 pt-4 pb-1 text-xs font-semibold text-text-muted uppercase tracking-wider">
        Gestión
      </p>

      <a
        routerLink="/admin/users"
        routerLinkActive="bg-surface-700 text-text-primary"
        [class]="navClasses"
      >
        <span [innerHTML]="dashboardIcons.users | safeHtml"></span>
        Usuarios
      </a>
    </nav>

    <div class="px-3 py-4 border-t border-surface-700">
      <a routerLink="/" [class]="navClasses">
        <span [innerHTML]="dashboardIcons.back | safeHtml"></span>
        Volver al sitio
      </a>
    </div>
  </aside>

  <main class="flex-1 ml-64">
    <router-outlet />
  </main>
</div>
