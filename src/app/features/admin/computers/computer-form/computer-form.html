<div class="p-8">
  <div class="mb-6">
    <a
      routerLink="/admin/computers"
      class="inline-flex items-center gap-1.5 text-sm text-text-secondary hover:text-text-primary transition-colors mb-3"
    >
      <span [innerHTML]="icons.arrowBack | safeHtml"></span>
      Volver a ordenadores
    </a>
    <h1 class="text-2xl font-bold text-text-primary">
      {{ isEditing() ? 'Editar ordenador' : 'Nuevo ordenador' }}
    </h1>
    <p class="mt-1 text-sm text-text-secondary">
      {{ isEditing() ? 'Modifica los datos del equipo' : 'Añade un nuevo equipo al local' }}
    </p>
  </div>

  <div class="glass-card-no-animation rounded-xl p-6 max-w-lg">
    @if ((isEditing() && computerResource.isLoading()) || zonesResource.isLoading()) {
      <div class="flex justify-center py-12">
        <span [innerHTML]="loadingIcon | safeHtml"></span>
      </div>
    } @else {
      <form class="space-y-5" (ngSubmit)="onSubmit()">
        <div>
          <label for="computer-name" class="block text-sm font-medium text-text-secondary mb-1.5">
            Nombre
          </label>
          <input
            id="computer-name"
            type="text"
            placeholder="Ej: PC-G05"
            class="w-full px-4 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-blue focus:ring-1 focus:ring-accent-blue transition-colors"
            [ngModel]="name()"
            (ngModelChange)="name.set($event)"
            name="computer-name"
          />
        </div>

        <div>
          <label for="computer-zone" class="block text-sm font-medium text-text-secondary mb-1.5">
            Zona
          </label>
          <select
            id="computer-zone"
            class="w-full px-4 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary focus:outline-none focus:border-accent-blue focus:ring-1 focus:ring-accent-blue transition-colors"
            [ngModel]="zoneId()"
            (ngModelChange)="zoneId.set($event)"
            name="computer-zone"
          >
            <option value="">Selecciona una zona</option>
            @for (zone of zonesResource.value(); track zone.id) {
              <option [value]="zone.id">{{ zone.name }}</option>
            }
          </select>
        </div>

        @if (isEditing()) {
          <div>
            <label
              for="computer-status"
              class="block text-sm font-medium text-text-secondary mb-1.5"
            >
              Estado
            </label>
            <select
              id="computer-status"
              class="w-full px-4 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary focus:outline-none focus:border-accent-blue focus:ring-1 focus:ring-accent-blue transition-colors"
              [ngModel]="status()"
              (ngModelChange)="status.set($event)"
              name="computer-status"
            >
              <option value="available">Disponible</option>
              <option value="maintenance">Mantenimiento</option>
              <option value="occupied">Ocupado</option>
            </select>
          </div>
        }

        <div>
          <label for="computer-specs" class="block text-sm font-medium text-text-secondary mb-1.5">
            Especificaciones
          </label>
          <textarea
            id="computer-specs"
            rows="3"
            placeholder="Ej: RTX 4070, i7-14700K, 32GB RAM"
            class="w-full px-4 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-blue focus:ring-1 focus:ring-accent-blue transition-colors resize-none"
            [ngModel]="specs()"
            (ngModelChange)="specs.set($event)"
            name="computer-specs"
          ></textarea>
        </div>

        <div class="flex items-center gap-3 pt-2">
          <button
            type="submit"
            class="px-6 py-2.5 text-sm font-semibold text-surface-900 bg-linear-to-r from-accent-blue to-accent-violet rounded-xl hover:opacity-90 transition-all cursor-pointer"
          >
            {{ isEditing() ? 'Guardar cambios' : 'Crear ordenador' }}
          </button>
          <a
            routerLink="/admin/computers"
            class="px-6 py-2.5 text-sm font-medium text-text-secondary hover:text-text-primary transition-colors"
          >
            Cancelar
          </a>
        </div>
      </form>
    }
  </div>
</div>
