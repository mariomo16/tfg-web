<section
  class="relative min-h-screen flex items-center justify-center bg-surface-900 overflow-hidden"
>
  <!-- Volver a inicio -->
  <a
    routerLink="/"
    class="absolute top-6 left-6 z-20 flex items-center gap-2 text-sm text-text-secondary hover:text-text-primary transition-colors group"
  >
    <svg
      class="w-5 h-5 transition-transform group-hover:-translate-x-0.5"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <title>Volver</title>
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M10 19l-7-7m0 0l7-7m-7 7h18"
      />
    </svg>
    Inicio
  </a>

  <!-- Fondos decorativos -->
  <div
    class="absolute top-1/4 right-1/4 w-80 h-80 bg-accent-violet/10 rounded-full blur-3xl animate-zoom-in"
  ></div>
  <div
    class="absolute bottom-1/4 left-1/4 w-80 h-80 bg-accent-blue/10 rounded-full blur-3xl animate-zoom-in"
  ></div>

  <!-- Card de registro -->
  <div
    class="relative z-10 w-full max-w-md mx-4 glass-card rounded-2xl p-6 animate-blurred-fade-in"
  >
    <!-- Encabezado -->
    <div class="text-center mb-5">
      <h1 class="text-2xl font-bold text-text-primary">Crea tu cuenta</h1>
      <p class="mt-1.5 text-sm text-text-secondary">Regístrate y empieza a reservar al instante</p>
    </div>

    <!-- Formulario -->
    <form class="space-y-3.5">
      <!-- Nombre completo -->
      <div>
        <label for="register-name" class="block text-sm font-medium text-text-secondary mb-1.5">
          Nombre completo
        </label>
        <input
          id="register-name"
          type="text"
          placeholder="Tu nombre"
          class="w-full px-4 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-violet focus:ring-1 focus:ring-accent-violet transition-colors"
        />
      </div>

      <!-- Email -->
      <div>
        <label for="register-email" class="block text-sm font-medium text-text-secondary mb-1.5">
          Correo electrónico
        </label>
        <input
          id="register-email"
          type="email"
          placeholder="tu@email.com"
          class="w-full px-4 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-violet focus:ring-1 focus:ring-accent-violet transition-colors"
        />
      </div>

      <!-- Contraseña y Confirmar contraseña -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label
            for="register-password"
            class="block text-sm font-medium text-text-secondary mb-1.5"
          >
            Contraseña
          </label>
          <input
            id="register-password"
            type="password"
            placeholder="Mín. 8 caracteres"
            class="w-full px-3 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-violet focus:ring-1 focus:ring-accent-violet transition-colors"
          />
        </div>
        <div>
          <label
            for="register-confirm"
            class="block text-sm font-medium text-text-secondary mb-1.5"
          >
            Confirmar
          </label>
          <input
            id="register-confirm"
            type="password"
            placeholder="Repite contraseña"
            class="w-full px-3 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-violet focus:ring-1 focus:ring-accent-violet transition-colors"
          />
        </div>
      </div>

      <!-- Términos -->
      <label class="flex items-start gap-2 cursor-pointer">
        <input
          type="checkbox"
          class="w-4 h-4 mt-0.5 rounded border-surface-600 bg-surface-800 text-accent-violet focus:ring-accent-violet focus:ring-offset-0"
        />
        <span class="text-sm text-text-secondary">
          Acepto los
          <a href="#" class="text-accent-violet hover:text-accent-blue transition-colors">
            términos y condiciones
          </a>
          y la
          <a href="#" class="text-accent-violet hover:text-accent-blue transition-colors">
            política de privacidad
          </a>
        </span>
      </label>

      <!-- Botón Registrarse -->
      <button
        type="submit"
        class="w-full py-2.5 text-sm font-semibold text-surface-900 bg-linear-to-r from-accent-violet to-accent-blue rounded-xl hover:opacity-90 transition-all hover:shadow-lg hover:shadow-accent-violet/25 cursor-pointer"
      >
        Crear cuenta
      </button>
    </form>

    <!-- Separador -->
    <div class="flex items-center gap-4 my-4">
      <div class="flex-1 h-px bg-surface-600"></div>
      <span class="text-sm text-text-muted">o regístrate con</span>
      <div class="flex-1 h-px bg-surface-600"></div>
    </div>

    <!-- Botones sociales -->
    <div class="grid grid-cols-2 gap-3">
      <button
        type="button"
        class="flex items-center justify-center gap-2 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm font-medium text-text-secondary hover:bg-surface-700 hover:text-text-primary transition-colors cursor-pointer"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
          <title>Google</title>
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
            fill="#4285F4"
          />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853"
          />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05"
          />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335"
          />
        </svg>
        Google
      </button>
      <button
        type="button"
        class="flex items-center justify-center gap-2 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm font-medium text-text-secondary hover:bg-surface-700 hover:text-text-primary transition-colors cursor-pointer"
      >
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <title>GitHub</title>
          <path
            d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
          />
        </svg>
        GitHub
      </button>
    </div>

    <!-- Link a login -->
    <p class="mt-4 text-center text-sm text-text-secondary">
      ¿Ya tienes cuenta?
      <a
        routerLink="/login"
        class="font-medium text-accent-violet hover:text-accent-blue transition-colors"
      >
        Inicia sesión
      </a>
    </p>
  </div>
</section>
