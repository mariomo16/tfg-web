<section
  class="relative min-h-screen flex items-center justify-center bg-surface-900 overflow-hidden"
>
  <a
    routerLink="/"
    class="absolute top-6 left-6 z-20 hidden sm:flex items-center gap-2 text-sm text-text-secondary hover:text-text-primary transition-colors group"
  >
    <svg
      class="w-5 h-5 transition-transform group-hover:-translate-x-0.5"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <title>Volver</title>
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M10 19l-7-7m0 0l7-7m-7 7h18"
      />
    </svg>
    Inicio
  </a>

  <div
    class="absolute top-1/3 left-1/4 w-80 h-80 bg-accent-blue/10 rounded-full blur-3xl animate-zoom-in"
  ></div>
  <div
    class="absolute bottom-1/3 right-1/4 w-80 h-80 bg-accent-violet/10 rounded-full blur-3xl animate-zoom-in"
  ></div>

  <div
    class="relative z-10 w-full max-w-md mx-4 glass-card-no-animation rounded-2xl p-8 animate-blurred-fade-"
  >
    <a
      routerLink="/"
      class="absolute top-9 left-5 sm:hidden flex items-center justify-center w-11 h-11 rounded-full bg-surface-800/50 border border-surface-600/50 text-text-secondary hover:text-text-primary transition-all"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <title>Volver</title>
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 19l-7-7m0 0l7-7m-7 7h18"
        />
      </svg>
    </a>

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-text-primary">Bienvenido de nuevo</h1>
      <p class="mt-2 text-text-secondary">Inicia sesión para gestionar tus reservas</p>
    </div>

    <form class="space-y-5">
      <div>
        <label for="login-email" class="block text-sm font-medium text-text-secondary mb-1.5">
          Correo electrónico
        </label>
        <input
          id="login-email"
          type="email"
          placeholder="tu@email.com"
          class="w-full px-4 py-3 bg-surface-800 border border-surface-600 rounded-xl text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-blue focus:ring-1 focus:ring-accent-blue transition-colors"
        />
      </div>

      <div>
        <label for="login-password" class="block text-sm font-medium text-text-secondary mb-1.5">
          Contraseña
        </label>
        <input
          id="login-password"
          type="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 bg-surface-800 border border-surface-600 rounded-xl text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-blue focus:ring-1 focus:ring-accent-blue transition-colors"
        />
      </div>

      <div class="flex items-center justify-between">
        <label class="flex items-center gap-2 cursor-pointer">
          <input
            type="checkbox"
            class="w-4 h-4 rounded border-surface-600 bg-surface-800 text-accent-blue focus:ring-accent-blue focus:ring-offset-0"
          />
          <span class="text-sm text-text-secondary">Recuérdame</span>
        </label>
        <a href="#" class="text-sm text-accent-blue hover:text-accent-violet transition-colors">
          ¿Olvidaste tu contraseña?
        </a>
      </div>

      <button
        type="submit"
        class="w-full py-3 text-base font-semibold text-surface-900 bg-linear-to-r from-accent-blue to-accent-violet rounded-xl hover:opacity-90 transition-all hover:shadow-lg hover:shadow-accent-blue/25 cursor-pointer"
      >
        Iniciar sesión
      </button>
    </form>

    <div class="flex items-center gap-4 my-6">
      <div class="flex-1 h-px bg-surface-600"></div>
      <span class="text-sm text-text-muted">o continúa con</span>
      <div class="flex-1 h-px bg-surface-600"></div>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <button
        type="button"
        class="flex items-center justify-center gap-2 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm font-medium text-text-secondary hover:bg-surface-700 hover:text-text-primary transition-colors cursor-pointer"
      >
        <span [innerHTML]="googleIcon | safeHtml"></span>
        Google
      </button>
      <button
        type="button"
        class="flex items-center justify-center gap-2 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm font-medium text-text-secondary hover:bg-surface-700 hover:text-text-primary transition-colors cursor-pointer"
      >
        <span [innerHTML]="githubIcon | safeHtml"></span>
        GitHub
      </button>
    </div>

    <p class="mt-6 text-center text-sm text-text-secondary">
      ¿No tienes cuenta?
      <a
        routerLink="/register"
        class="font-medium text-accent-blue hover:text-accent-violet transition-colors"
      >
        Regístrate gratis
      </a>
    </p>
  </div>
</section>
