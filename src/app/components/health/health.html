@let cfg = statusConfig();

<div
  class="relative flex justify-center items-center min-h-screen bg-gray-100 selection:bg-red-500 selection:text-white font-sans"
>
  <div class="w-full sm:w-3/4 xl:w-1/2 mx-auto p-6">
    <div class="px-6 py-4 bg-white rounded-lg shadow-2xl shadow-gray-500/20 flex items-center">
      <div class="relative flex h-3 w-3">
        <span
          class="absolute inline-flex h-full w-full rounded-full opacity-75"
          [class]="cfg.animation + ' ' + cfg.dot"
        ></span>
        <span class="relative inline-flex rounded-full h-3 w-3" [class]="cfg.dot"></span>
      </div>

      <div class="ml-6">
        <h2 class="text-xl font-semibold text-gray-900">{{ cfg.title }}</h2>
        <p class="mt-2 text-gray-500 text-sm leading-relaxed">{{ cfg.message }}</p>
      </div>
    </div>
  </div>
</div>
