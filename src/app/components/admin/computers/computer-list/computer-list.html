<div class="p-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-text-primary">Ordenadores</h1>
      <p class="mt-1 text-sm text-text-secondary">Gestiona los equipos del local</p>
    </div>
    <a
      routerLink="/admin/computers/new"
      class="px-4 py-2.5 text-sm font-semibold text-surface-900 bg-linear-to-r from-accent-blue to-accent-violet rounded-xl hover:opacity-90 transition-all cursor-pointer"
    >
      + Nuevo ordenador
    </a>
  </div>

  <div class="glass-card-no-animation rounded-xl overflow-hidden">
    <table class="w-full">
      <thead>
        <tr class="border-b border-surface-600">
          @for (key of computerKeys; track key) {
            <th class="text-left px-6 py-3 text-xs font-semibold text-text-muted tracking-wider">
              {{ key }}
            </th>
          }
          <th
            class="text-right px-6 py-3 text-xs font-semibold text-text-muted uppercase tracking-wider"
          >
            Acciones
          </th>
        </tr>
      </thead>
      <tbody class="divide-y divide-surface-700">
        @for (computer of computers(); track computer.id) {
          <tr class="hover:bg-surface-700/30 transition-colors">
            <td class="px-6 py-4 text-sm text-text-muted">{{ computer.id }}</td>
            <td class="px-6 py-4 text-sm font-medium text-text-primary">{{ computer.name }}</td>
            <td class="px-6 py-4 text-sm text-text-secondary">{{ computer.zone.name }}</td>
            <td class="px-6 py-4">
              <span
                class="inline-flex px-2.5 py-0.5 text-xs font-medium rounded-full"
                [class]="computer.statusAccent"
                >{{ computer.status }}</span
              >
            </td>
            <td class="px-6 py-4 text-sm text-text-secondary">{{ computer.specs }}</td>
            <td class="px-6 py-4 text-right">
              <a
                routerLink="/admin/computers/1/edit"
                class="text-sm text-accent-blue hover:text-accent-violet transition-colors mr-3"
                >Editar</a
              >
              <button
                (click)="deleteComputer(computer.id)"
                type="button"
                class="text-sm text-red-400 hover:text-red-300 transition-colors cursor-pointer"
              >
                Eliminar
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
