<div class="p-8">
  <div class="mb-6">
    <a
      routerLink="/admin/users"
      class="inline-flex items-center gap-1.5 text-sm text-text-secondary hover:text-text-primary transition-colors mb-3"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <title>Volver a usuarios</title>
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 19l-7-7m0 0l7-7m-7 7h18"
        />
      </svg>
      Volver a usuarios
    </a>
    <h1 class="text-2xl font-bold text-text-primary">Nuevo usuario</h1>
    <p class="mt-1 text-sm text-text-secondary">Crea un nuevo usuario en el sistema</p>
  </div>

  <div class="glass-card rounded-xl p-6 max-w-lg">
    <form class="space-y-5">
      <div>
        <label for="user-name" class="block text-sm font-medium text-text-secondary mb-1.5"
          >Nombre</label
        >
        <input
          id="user-name"
          type="text"
          placeholder="Nombre completo"
          class="w-full px-4 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-blue focus:ring-1 focus:ring-accent-blue transition-colors"
        />
      </div>

      <div>
        <label for="user-email" class="block text-sm font-medium text-text-secondary mb-1.5"
          >Correo electrónico</label
        >
        <input
          id="user-email"
          type="email"
          placeholder="usuario@email.com"
          class="w-full px-4 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-blue focus:ring-1 focus:ring-accent-blue transition-colors"
        />
      </div>

      <div>
        <label for="user-password" class="block text-sm font-medium text-text-secondary mb-1.5"
          >Contraseña</label
        >
        <input
          id="user-password"
          type="password"
          placeholder="Mínimo 8 caracteres"
          class="w-full px-4 py-2.5 bg-surface-800 border border-surface-600 rounded-xl text-sm text-text-primary placeholder-text-muted focus:outline-none focus:border-accent-blue focus:ring-1 focus:ring-accent-blue transition-colors"
        />
      </div>

      <div class="flex items-center gap-3 pt-2">
        <button
          type="submit"
          class="px-6 py-2.5 text-sm font-semibold text-surface-900 bg-linear-to-r from-accent-blue to-accent-violet rounded-xl hover:opacity-90 transition-all cursor-pointer"
        >
          Guardar usuario
        </button>
        <a
          routerLink="/admin/users"
          class="px-6 py-2.5 text-sm font-medium text-text-secondary hover:text-text-primary transition-colors"
        >
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
